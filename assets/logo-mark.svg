    <filter id="shadow" x="-40" y="-40" width="620" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="980" height="240" rx="28" fill="white"/>

