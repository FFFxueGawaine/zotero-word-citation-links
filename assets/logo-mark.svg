    <rect x="58" y="108" width="210" height="36" rx="18" fill="url(#accentB)"/>
    <text x="163" y="131" text-anchor="middle" fill="white" font-size="17" font-weight="700" font-family="'Segoe UI', Arial, sans-serif">(Smith, 2024)</text>

    <rect x="58" y="160" width="188" height="32" rx="16" fill="url(#accentC)"/>
    <text x="152" y="181" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="'Segoe UI', Arial, sans-serif">Create Links</text>

    <path d="M284 74C338 74 354 92 394 96" stroke="#D83B01" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M312 126C362 126 378 143 417 150" stroke="#2563EB" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M272 176C323 176 343 191 388 192" stroke="#0F766E" stroke-width="4.5" stroke-linecap="round"/>

    <rect x="400" y="72" width="100" height="112" rx="18" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="421" y="95" width="58" height="10" rx="5" fill="#0F172A"/>
    <rect x="421" y="118" width="52" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="421" y="134" width="48" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="421" y="154" width="42" height="10" rx="5" fill="#D83B01" fill-opacity="0.18"/>
